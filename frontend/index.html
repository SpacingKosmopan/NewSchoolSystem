<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- MODAL -->
    <div class="modal-overlay" id="gradeModal">
      <div class="modal-box">
        <h3 id="modalTitle">Dodaj ocenę</h3>
        <form id="gradeForm">
          <input type="hidden" id="studentIdInput" />

          <div class="form-group">
            <label for="gradeInput">Ocena</label>
            <select name="gradeInput" id="gradeInput" required></select>
          </div>

          <div class="form-group">
            <label for="subjectInput">Przedmiot</label>
            <select name="subjectInput" id="subjectInput" required></select>
          </div>

          <div class="form-group">
            <label for="weightInput">Waga oceny</label>
            <select id="weightInput">
              <option value="1">1 (odpowiedź)</option>
              <option value="2">2 (karta pracy)</option>
              <option value="3">3 (kartkówka)</option>
              <option value="5">5 (sprawdzian)</option>
            </select>
          </div>

          <!--TODO: DATA -->
          <!--TODO: WSTAWIAJĄCY -->
          <!--TODO: POPRAWA -->
          <!--TODO: KATEGORIE -->
          <!--TODO: WAGI -->

          <div class="form-group">
            <label for="commentInput">Komentarz</label>
            <input
              type="text"
              id="commentInput"
              placeholder="np. Aktywność na lekcji"
            />
          </div>

          <div class="modal-actions">
            <button type="button" class="btn-cancel" onclick="closeModal()">
              Anuluj
            </button>
            <button type="submit" class="btn-save">Zapisz</button>
          </div>
        </form>
      </div>
    </div>
    <script>
      let selectedClass;
      let classStudents;
      let subjects;

      const gradesValues = [
        { name: "1", value: "1" },
        { name: "1+", value: "1.25" },
        { name: "2-", value: "1.75" },
        { name: "2", value: "2" },
        { name: "2+", value: "2.25" },
        { name: "3-", value: "2.75" },
        { name: "3", value: "3" },
        { name: "3+", value: "3.25" },
        { name: "4-", value: "3.75" },
        { name: "4", value: "4" },
        { name: "4+", value: "4.25" },
        { name: "5-", value: "4.75" },
        { name: "5", value: "5" },
        { name: "5+", value: "5.25" },
        { name: "6-", value: "5.75" },
        { name: "6", value: "6" },
      ];

      (async () => {
        const responseClass = await fetch(
          "http://localhost:3000/api/classes/0",
        );
        if (!responseClass.ok) {
          document.body.innerText = "class not found";
          return;
        }
        const selectedClassResult = await responseClass.json();
        selectedClass = selectedClassResult.result;

        const responseStudents = await fetch(
          `http://localhost:3000/api/classes/${selectedClass.id}/students`,
        );
        const studentsResult = await responseStudents.json();
        classStudents = studentsResult.result;

        const responseSubjects = await fetch(
          `http://localhost:3000/api/subjects`,
        );
        const subjectsResult = await responseSubjects.json();
        subjects = subjectsResult.result;

        //
        document.querySelector("#gradeInput").innerHTML = "";

        gradesValues.forEach((g) => {
          document.querySelector("#gradeInput").innerHTML +=
            `<option value=${g.value}>${g.name}</option>`;
        });

        const subjectSelectField = document.getElementById("subjectInput");
        subjectSelectField.innerHTML = "";
        const values = Object.values(subjects);
        values.forEach((value, index) => {
          subjectSelectField.innerHTML += `<option value="${value}">${value}</option>`;
        });
        //
        await renderStudents(classStudents);
      })();

      async function renderStudents(students) {
        const container = document.createElement("div");
        container.className = "journal-container";

        const header = document.createElement("div");
        header.className = "journal-header";
        header.innerHTML = `<h2>Klasa: ${selectedClass.name || "Dziennik ocen"}</h2>`;
        container.appendChild(header);

        const table = document.createElement("table");
        table.className = "students-table";
        table.innerHTML = `
          <thead>
            <tr>
              <th class="col-num">Lp.</th>
              <th class="col-actions">Akcje</th>
              <th class="col-name">Nazwisko i imię</th>
              <th>Oceny bieżące</th>
              <th>Średnia</th>
              <th>Końcowa</th>
            </tr>
          </thead>
          <tbody id="students-tbody"></tbody>
        `;
        container.appendChild(table);

        const tbody = table.querySelector("#students-tbody");

        const gradesPromises = students.map((student) =>
          renderGrades(student.id),
        );
        const allGradesBoxes = await Promise.all(gradesPromises);

        students.forEach((student, index) => {
          const row = document.createElement("tr");

          row.innerHTML = `
            <td class="col-num">${index + 1}</td>
            <td class="col-actions">
              <button class="btn-add-grade" onclick="newGradeForStudent(${student.id})">+</button>
            </td>
            <td class="col-name">${student.lastName} ${student.firstName}</td>
          `;

          const gradesTd = document.createElement("td");
          const studentGradesBox = allGradesBoxes[index];
          gradesTd.appendChild(studentGradesBox);
          row.appendChild(gradesTd);

          tbody.appendChild(row);
        });

        document.body.appendChild(container);
      }

      async function renderGrades(studentId) {
        const gradesRequest = await fetch(
          `http://localhost:3000/api/students/${studentId}/grades`,
        );
        const gradesResult = await gradesRequest.json();
        const grades = gradesResult.result;

        const gradesBox = document.createElement("div");
        gradesBox.className = "grades-container";

        if (!grades || grades.length === 0) {
          gradesBox.innerHTML = '<span class="no-grades">Brak ocen</span>';
          return gradesBox;
        }

        grades.forEach((grade) => {
          let color = "#2196F3";
          if (grade.weight >= 5) color = "#f44336";
          if (grade.weight <= 2) color = "#4CAF50";

          if (grade.improved === null) {
            gradesBox.innerHTML += `
              <span class="grade-badge" style="background-color: ${color};" title="Temat: ${grade.subject || ""}\nWaga: ${grade.weight || 1}\nKomentarz: ${grade.comment || ""}">
                ${grade.grade}
              </span>
            `;
          } else {
            gradesBox.innerHTML += `
              [<span class="grade-badge" style="background-color: ${color};" title="Temat: ${grade.subject || ""}\nWaga: ${grade.weight || 1}\nKomentarz: ${grade.comment || ""}">
                ${grade.grade}
              </span>
              <span class="grade-badge" style="background-color: ${color};" title="Temat: ${grade.subject || ""}\nWaga: ${grade.weight || 1}\nKomentarz: ${grade.comment || ""}">
                ${grade.improved}
              </span>]
              `;
          }
        });

        return gradesBox;
      }

      function newGradeForStudent(id) {
        document.getElementById("studentIdInput").value = id;
        document.getElementById("modalTitle").innerText = `Dodaj ocenę`;
        document.getElementById("gradeForm").reset();
        document.getElementById("gradeModal").style.display = "flex";
      }
      function closeModal() {
        document.getElementById("gradeModal").style.display = "none";
      }
      document
        .getElementById("gradeForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const studentId = document.getElementById("studentIdInput").value;
          const gradeData = {
            grade: parseInt(document.getElementById("gradeInput").value),
            subject: document.getElementById("subjectInput").value,
            weight: parseInt(document.getElementById("weightInput").value),
            comment: document.getElementById("commentInput").value,
          };
          try {
            const response = await fetch(
              `http://localhost:3000/api/students/${studentId}/grades`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(gradeData),
              },
            );
            if (response.ok) {
              closeModal();
              await renderStudents(classStudents);
            } else {
              alert("Błąd podczas dodawania oceny");
            }
          } catch (error) {
            console.error("Błąd sieci:", error);
          }
        });
    </script>
  </body>
</html>
